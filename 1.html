<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Character: Man with White Laptop</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 0.3px;
            border-left: 4px solid #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            color: rgba(255,255,255,0.8);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; bottom: 12px; left: 12px; }
            #controls-hint { font-size: 9px; bottom: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <div id="info">
        👨‍💻 3D Character | Man holding a <span style="color:#ffffff; font-weight:bold;">White Laptop</span>
    </div>
    <div id="controls-hint">
        🖱️ Drag to rotate | Scroll to zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene, Camera, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Deep subtle blue-gray
        scene.fog = new THREE.FogExp2(0x111122, 0.008); // Slight fog for depth

        // Perspective Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 1.5, 4);
        camera.lookAt(0, 1, 0);

        // WebGL Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Enable shadows for better realism
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // CSS2DRenderer for simple text label (optional)
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.2;
        controls.rotateSpeed = 1.0;
        controls.target.set(0, 1.2, 0);

        // --- Lighting System (Polished) ---
        // Ambient light for base illumination
        const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
        scene.add(ambientLight);
        
        // Main directional light (simulating sun / key light)
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.2);
        mainLight.position.set(4, 5, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 8;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        // Fill light from below and sides
        const fillLight = new THREE.PointLight(0x88aaff, 0.35);
        fillLight.position.set(1, 0.5, 2);
        scene.add(fillLight);
        
        // Rim/back light to highlight edges
        const rimLight = new THREE.PointLight(0xffaa66, 0.5);
        rimLight.position.set(-2, 1.8, -3);
        scene.add(rimLight);
        
        // Warm fill from the front-right
        const warmFill = new THREE.PointLight(0xffcc88, 0.4);
        warmFill.position.set(2, 1.2, 2.5);
        scene.add(warmFill);
        
        // Optional: subtle blue fill from left
        const blueFill = new THREE.PointLight(0x88aaff, 0.25);
        blueFill.position.set(-1.5, 1, 1.8);
        scene.add(blueFill);
        
        // --- Environment: Simple curved floor and background elements ---
        // Circular platform with shadow reception
        const platformGeometry = new THREE.CylinderGeometry(2.2, 2.2, 0.1, 32);
        const platformMaterial = new THREE.MeshStandardMaterial({ color: 0x2c2f36, roughness: 0.4, metalness: 0.1 });
        const platform = new THREE.Mesh(platformGeometry, platformMaterial);
        platform.position.set(0, -0.6, 0);
        platform.receiveShadow = true;
        platform.castShadow = true;
        scene.add(platform);
        
        // Reflective subtle grid helper (aesthetic)
        const gridHelper = new THREE.GridHelper(6, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.55;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);
        
        // Simple background studio spheres / floating particles? optional clean look
        // Add a few floating dust particles to enhance depth
        const particleCount = 400;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 12;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 4 + 1;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 10 - 3;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({ color: 0x88aaff, size: 0.03, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);
        
        // --- Create the Man (Stylized humanoid) ---
        const manGroup = new THREE.Group();
        
        // Colors
        const skinColor = 0xfdd7a8;
        const shirtColor = 0x3a6ea5;   // nice blue shirt
        const pantsColor = 0x2c3e4e;
        const shoeColor = 0x4a3b32;
        
        // 1. Torso (box)
        const torsoGeo = new THREE.BoxGeometry(0.7, 0.9, 0.45);
        const torsoMat = new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.3, metalness: 0.1 });
        const torso = new THREE.Mesh(torsoGeo, torsoMat);
        torso.position.set(0, 0.45, 0);
        torso.castShadow = true;
        torso.receiveShadow = true;
        manGroup.add(torso);
        
        // 2. Head (sphere)
        const headGeo = new THREE.SphereGeometry(0.38, 32, 32);
        const headMat = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.25 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.set(0, 1.05, 0);
        head.castShadow = true;
        head.receiveShadow = true;
        manGroup.add(head);
        
        // Hair (simple dark hemisphere)
        const hairGeo = new THREE.SphereGeometry(0.4, 24, 24, 0, Math.PI * 2, 0, Math.PI / 2.5);
        const hairMat = new THREE.MeshStandardMaterial({ color: 0x2c1e12, roughness: 0.6 });
        const hair = new THREE.Mesh(hairGeo, hairMat);
        hair.position.set(0, 1.18, 0.05);
        hair.castShadow = true;
        manGroup.add(hair);
        
        // 3. Legs (cylinders)
        const legGeo = new THREE.CylinderGeometry(0.14, 0.14, 0.8, 8);
        const legMat = new THREE.MeshStandardMaterial({ color: pantsColor, roughness: 0.5 });
        
        const leftLeg = new THREE.Mesh(legGeo, legMat);
        leftLeg.position.set(-0.22, 0.05, 0);
        leftLeg.castShadow = true;
        manGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(legGeo, legMat);
        rightLeg.position.set(0.22, 0.05, 0);
        rightLeg.castShadow = true;
        manGroup.add(rightLeg);
        
        // Shoes
        const shoeGeo = new THREE.BoxGeometry(0.22, 0.12, 0.32);
        const shoeMat = new THREE.MeshStandardMaterial({ color: shoeColor, roughness: 0.7 });
        const leftShoe = new THREE.Mesh(shoeGeo, shoeMat);
        leftShoe.position.set(-0.22, -0.32, 0.08);
        leftShoe.castShadow = true;
        const rightShoe = new THREE.Mesh(shoeGeo, shoeMat);
        rightShoe.position.set(0.22, -0.32, 0.08);
        rightShoe.castShadow = true;
        manGroup.add(leftShoe);
        manGroup.add(rightShoe);
        
        // 4. Arms (cylinders)
        const armGeo = new THREE.CylinderGeometry(0.11, 0.09, 0.7, 8);
        const armMat = new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.4 });
        
        // Left arm (will be rotated to hold laptop)
        const leftArm = new THREE.Mesh(armGeo, armMat);
        leftArm.position.set(-0.48, 0.85, 0);
        leftArm.castShadow = true;
        manGroup.add(leftArm);
        
        // Right arm
        const rightArm = new THREE.Mesh(armGeo, armMat);
        rightArm.position.set(0.48, 0.85, 0);
        rightArm.castShadow = true;
        manGroup.add(rightArm);
        
        // Hands (simple spheres)
        const handMat = new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.3 });
        const leftHand = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), handMat);
        leftHand.position.set(-0.78, 0.85, 0.25);
        leftHand.castShadow = true;
        const rightHand = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), handMat);
        rightHand.position.set(0.78, 0.85, 0.25);
        rightHand.castShadow = true;
        manGroup.add(leftHand);
        manGroup.add(rightHand);
        
        // Add a simple belt for detail
        const beltGeo = new THREE.BoxGeometry(0.75, 0.08, 0.5);
        const beltMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, metalness: 0.3 });
        const belt = new THREE.Mesh(beltGeo, beltMat);
        belt.position.set(0, 0.12, 0.1);
        belt.castShadow = true;
        manGroup.add(belt);
        
        scene.add(manGroup);
        
        // --- Create the White Laptop (with sleek white finish) ---
        const laptopGroup = new THREE.Group();
        
        // Laptop Base (main body) – white
        const baseGeo = new THREE.BoxGeometry(0.85, 0.08, 0.65);
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f7, roughness: 0.25, metalness: 0.45, emissive: 0x222222, emissiveIntensity: 0.05 });
        const laptopBase = new THREE.Mesh(baseGeo, whiteMat);
        laptopBase.castShadow = true;
        laptopBase.receiveShadow = true;
        laptopBase.position.set(0, 0, 0);
        laptopGroup.add(laptopBase);
        
        // Keyboard area subtle detail (dark keys inset)
        const keyMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5, metalness: 0.1 });
        const keyAreaGeo = new THREE.BoxGeometry(0.70, 0.02, 0.45);
        const keyArea = new THREE.Mesh(keyAreaGeo, keyMat);
        keyArea.position.set(0, 0.05, 0.03);
        keyArea.castShadow = false;
        laptopGroup.add(keyArea);
        
        // Trackpad
        const trackpadGeo = new THREE.BoxGeometry(0.22, 0.02, 0.28);
        const trackpadMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, roughness: 0.3, metalness: 0.2 });
        const trackpad = new THREE.Mesh(trackpadGeo, trackpadMat);
        trackpad.position.set(0.28, 0.05, -0.15);
        laptopGroup.add(trackpad);
        
        // Laptop Screen (hinged, slightly tilted back)
        const screenGroup = new THREE.Group();
        const screenMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f5, roughness: 0.2, metalness: 0.6 });
        const screenBezelGeo = new THREE.BoxGeometry(0.78, 0.55, 0.025);
        const screenBezel = new THREE.Mesh(screenBezelGeo, screenMat);
        screenBezel.castShadow = true;
        screenGroup.add(screenBezel);
        
        // Display panel (glowing slightly to show screen)
        const displayMat = new THREE.MeshStandardMaterial({ color: 0x88aaff, emissive: 0x4488ff, emissiveIntensity: 0.35, transparent: true, opacity: 0.9 });
        const displayGeo = new THREE.BoxGeometry(0.68, 0.44, 0.01);
        const display = new THREE.Mesh(displayGeo, displayMat);
        display.position.set(0, 0, 0.018);
        display.castShadow = false;
        screenGroup.add(display);
        
        // Add subtle webcam dot
        const webcamGeo = new THREE.SphereGeometry(0.022, 8, 8);
        const webcamMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.8 });
        const webcam = new THREE.Mesh(webcamGeo, webcamMat);
        webcam.position.set(0, 0.22, 0.04);
        screenGroup.add(webcam);
        
        // Hinge effect: rotate screen back by about 100 degrees for realistic laptop open pose
        screenGroup.rotation.x = -0.95; // tilt screen back
        screenGroup.position.set(0, 0.074, -0.28);
        laptopGroup.add(screenGroup);
        
        // Add subtle white Apple-like logo on lid (just decoration)
        const logoMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8 });
        const logoGeo = new THREE.CylinderGeometry(0.07, 0.07, 0.01, 12);
        const logo = new THREE.Mesh(logoGeo, logoMat);
        logo.rotation.x = Math.PI / 2;
        logo.position.set(0, 0.155, 0.041);
        screenGroup.add(logo);
        
        // Position Laptop in front of the man, held by hands
        laptopGroup.position.set(0, 0.92, 0.68);
        laptopGroup.castShadow = true;
        laptopGroup.receiveShadow = true;
        scene.add(laptopGroup);
        
        // --- Adjust Arm Rotations to realistically hold the laptop ---
        // Left arm: rotate to reach laptop side
        leftArm.rotation.z = -0.45;
        leftArm.rotation.x = 0.35;
        // Right arm: symmetric hold
        rightArm.rotation.z = 0.45;
        rightArm.rotation.x = 0.35;
        
        // Position hands exactly at laptop's front corners (fine-tuned)
        leftHand.position.set(-0.47, 0.88, 0.59);
        rightHand.position.set(0.47, 0.88, 0.59);
        
        // Optionally add a subtle glow around the laptop (white aura)
        const auraGeometry = new THREE.SphereGeometry(0.5, 16, 16);
        const auraMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.06, side: THREE.BackSide });
        const aura = new THREE.Mesh(auraGeometry, auraMaterial);
        aura.position.copy(laptopGroup.position);
        scene.add(aura);
        
        // --- Add a simple CSS2D label for "White Laptop" (floating text) ---
        const labelDiv = document.createElement('div');
        labelDiv.textContent = '💻 White Laptop';
        labelDiv.style.color = '#ffffff';
        labelDiv.style.fontSize = '14px';
        labelDiv.style.fontWeight = '500';
        labelDiv.style.textShadow = '1px 1px 0px rgba(0,0,0,0.5)';
        labelDiv.style.backgroundColor = 'rgba(0,0,0,0.5)';
        labelDiv.style.padding = '2px 10px';
        labelDiv.style.borderRadius = '20px';
        labelDiv.style.backdropFilter = 'blur(4px)';
        labelDiv.style.fontFamily = 'sans-serif';
        labelDiv.style.pointerEvents = 'none';
        const labelObj = new CSS2DObject(labelDiv);
        labelObj.position.set(0, 1.25, 0.7);
        scene.add(labelObj);
        
        // Add a floating name tag for the man (optional)
        const nameDiv = document.createElement('div');
        nameDiv.textContent = '👨 Alex';
        nameDiv.style.color = '#eef';
        nameDiv.style.fontSize = '12px';
        nameDiv.style.backgroundColor = 'rgba(0,0,0,0.45)';
        nameDiv.style.padding = '2px 10px';
        nameDiv.style.borderRadius = '20px';
        nameDiv.style.fontFamily = 'sans-serif';
        const nameLabel = new CSS2DObject(nameDiv);
        nameLabel.position.set(0, 1.45, 0);
        scene.add(nameLabel);
        
        // --- Simple Animation Loop: Slight idle floating particles and subtle laptop screen pulse ---
        let time = 0;
        
        // Also a tiny rotation animation for the laptop to make it feel alive? not necessary but nice
        // Just add a gentle bob to aura and particles
        function animate() {
            const deltaTime = 1/60; // approx for smoothness
            time += 0.016;
            
            // Gentle floating aura pulse
            const scale = 1 + Math.sin(time * 2.5) * 0.02;
            aura.scale.set(scale, scale, scale);
            
            // Screen emissive intensity pulse (modern laptop look)
            if (display.material) {
                const intensity = 0.35 + Math.sin(time * 3) * 0.08;
                display.material.emissiveIntensity = intensity;
            }
            
            // Slight bounce particles
            particles.rotation.y = time * 0.05;
            particles.rotation.x = Math.sin(time * 0.2) * 0.1;
            
            // Update controls and render
            controls.update(); // update orbit controls
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(animate);
        }
        
        // Optional: Add a reflective environment sphere? Not needed for performance, but simple.
        
        // --- Responsive Handling ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Start the animation loop
        animate();
        
        // Small console log to confirm
        console.log('3D Scene Ready: Man with White Laptop | Fully interactive');
    </script>
</body>
</html>
